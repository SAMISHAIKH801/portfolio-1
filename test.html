<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Shaikh - Hybrid Layout</title>
    <style>
        :root {
            --bg-color: #999d9e; 
            --dark-pill: #1c1d20;
            --text-white: #ffffff;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            overflow: hidden; height: 100%;
        }

        .hero-section {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- DESKTOP IMAGE (Fixed Width) --- */
        .center-box {
            height: 100vh;
            width: 40%; 
            display: flex;
            justify-content: center;
            z-index: 5;
            transition: all 0.5s ease;
        }

        .hero-img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* --- LEFT PILL (Desktop) --- */
        .left-box {
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            z-index: 40;
        }

        .location-pill {
            background: var(--dark-pill);
            color: var(--text-white);
            display: flex;
            align-items: center;
            padding: 12px 25px 12px 35px; 
            border-radius: 0 100px 100px 0;
            gap: 12px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* --- RIGHT BOX (Desktop) --- */
        .right-box {
            position: absolute;
            right: 40px; top: 50%;
            transform: translateY(-50%);
            text-align: right;
            color: #fff;
            z-index: 30;
        }

        .freelance-text { font-size: 22px; line-height: 1.2; font-weight: 300; }

        /* --- MARQUEE --- */
        .marquee-wrapper {
            position: absolute;
            bottom: 18%; 
            width: 100%;
            z-index: 10;
        }

        .marquee-content {
            display: flex;
            white-space: nowrap;
            animation: scrollMarquee 20s linear infinite;
        }

        .marquee-text {
            font-size: 14vw; font-weight: 500;
            color: #fff; padding-right: 50px;
            text-transform: uppercase;
        }

        /* --- FOOTER BRANDING (Desktop Only) --- */
        .footer-branding {
            position: absolute;
            bottom: 5%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 50;
        }

        .letter { font-size: 60px; font-weight: 800; color: #fff; }
        .horse-logo { width: 60px; filter: brightness(0) invert(1); }

        .globe-icon { width: 20px; height: 20px; animation: rotateGlobe 5s linear infinite; }
        @keyframes rotateGlobe { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes scrollMarquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- MOBILE RESPONSIVE (Strictly for Mobile) --- */
        @media (max-width: 768px) {
            /* 1. Image becomes background */
            .center-box { width: 100%; position: absolute; left: 0; }
            
            /* 2. Hide Desktop Elements */
            .left-box, .footer-branding { display: none; }
            
            /* 3. New Bottom Bar for Mobile */
            .right-box {
                position: absolute;
                bottom: 30px; left: 0; right: 0;
                top: auto; transform: none;
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                box-sizing: border-box;
                text-align: left;
            }

            /* Move Freelance text to left in the same row */
            .freelance-text { font-size: 14px; order: 1; }
            
            /* Add back location pill for mobile on the right side */
            .right-box::after {
                content: "Located in Pakistan";
                background: var(--dark-pill);
                padding: 8px 15px;
                border-radius: 100px;
                font-size: 9px;
                text-transform: uppercase;
                order: 2;
            }

            .marquee-wrapper { bottom: 25%; }
            .marquee-text { font-size: 22vw; }
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="left-box">
            <div class="location-pill">
                <span>Located in Pakistan</span>
                <svg class="globe-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
            </div>
        </div>

        <div class="center-box">
            <img src="images/mainimg.png" alt="Sami Shaikh" class="hero-img">
        </div>

        <div class="right-box">
            <div class="freelance-text">
                <span style="font-size: 20px; display: block; margin-bottom: 5px;">↓</span>
                Freelance<br>Designer & Developer
            </div>
        </div>

        <div class="marquee-wrapper">
            <div class="marquee-content">
                <div class="marquee-text">Sami Shaikh —</div>
                <div class="marquee-text">Sami Shaikh —</div>
            </div>
        </div>

        <div class="footer-branding">
            <div class="letter">R</div>
            <img src="https://cdn-icons-png.flaticon.com/512/3063/3063167.png" class="horse-logo" alt="Horse">
            <div class="letter">K</div>
        </div>
    </main>

</body>
</html>
