<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Shaikh - Premium Portfolio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0e0e0e; color: #fff; overflow-x: hidden; }

        /* Fast Responsive Cursor */
        #custom-cursor {
            position: fixed;
            width: 80px; height: 80px;
            background: #b4f4e0; 
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none; z-index: 999;
            transform: scale(0);
        }
        #custom-cursor svg { width: 25px; height: 25px; stroke: #000; }
        .card-link:hover { cursor: none; }

        .work-section { padding: 100px 4%; max-width: 1600px; margin: 0 auto; }

        /* Title Animation Styles */
        .header-row {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 80px; border-bottom: 1px solid #333; padding-bottom: 40px;
        }
        .section-title { font-size: clamp(3rem, 10vw, 6rem); font-weight: 500; letter-spacing: -2px; line-height: 1; }
        .title-word { color: #222; display: inline-block; margin-right: 0.2em; transition: color 0.1s; }

        .header-desc { max-width: 280px; font-size: 11px; text-transform: uppercase; line-height: 1.5; color: #888; text-align: right; }

        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px 40px; }
        .card-link { text-decoration: none; color: inherit; display: block; }

        .reveal-box {
            position: relative; width: 100%; height: clamp(190px, 35vw, 380px);
            overflow: hidden; border-radius: 20px; background: #151515; visibility: hidden; 
        }
        .reveal-img {
            width: 100%; height: 100%; object-fit: contain;
            position: absolute; top: 0; left: 0;
            transition: filter 0.6s ease, transform 0.6s ease;
        }
        .card-link:hover .reveal-img { filter: blur(8px) brightness(0.7); transform: scale(1.05); }

        /* Character Reveal Styles for Card Info */
        .card-info { margin-top: 25px; }
        .card-name { font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 400; margin-bottom: 8px; overflow: hidden; }
        .card-category { font-size: 10px; color: #666; letter-spacing: 2px; text-transform: uppercase; overflow: hidden; }
        
        /* Splitting Classes */
        .char-box { display: inline-block; overflow: hidden; vertical-align: bottom; }
        .char { display: inline-block; transform: translateY(100%); white-space: pre; }

        .spacer { height: 100vh; display: flex; justify-content: center; align-items: center; color: #333; letter-spacing: 10px; font-size: 12px; }

        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header-row { flex-direction: column; align-items: flex-start; gap: 20px; }
            .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 40px;
    border-bottom: 1px solid #333;
    padding-bottom: 40px;
}
            .header-desc { text-align: left; }


            .cards-grid {
    
    gap: 30px 40px;
}

        }
    </style>
</head>
<body>

    <div id="custom-cursor">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
    </div>

    <section class="spacer">SCROLL TO PROJECTS</section>

    <section class="work-section">
        <div class="header-row">
            <h2 class="section-title" id="main-title">Featured Works</h2>
            <p class="header-desc">Building high-quality Shopify & Custom Frontend experiences.</p>
        </div>

        <div class="cards-grid">
            <a href="#" class="card-link">
                <div class="card">
                    <div class="reveal-box">
                        <img src="images/Screenshot 2026-04-13 051731.png" class="reveal-img">
                    </div>
                    <div class="card-info">
                        <h3 class="card-name animate-text">A&R Original</h3>
                        <p class="card-category animate-text">Shopify • Automotive • 2026</p>
                    </div>
                </div>
            </a>

            <a href="#" class="card-link">
                <div class="card">
                    <div class="reveal-box">
                        <img src="images/Screenshot 2026-04-13 051731.png" class="reveal-img">
                    </div>
                    <div class="card-info">
                        <h3 class="card-name animate-text">Of The Oak Studio</h3>
                        <p class="card-category animate-text">Web Design • Branding</p>
                    </div>
                </div>
            </a>

            <a href="#" class="card-link">
                <div class="card">
                    <div class="reveal-box">
                        <img src="images/Screenshot 2026-04-13 051731.png" class="reveal-img">
                    </div>
                    <div class="card-info">
                        <h3 class="card-name animate-text">Of The Oak Studio</h3>
                        <p class="card-category animate-text">Web Design • Branding</p>
                    </div>
                </div>
            </a>


            <a href="#" class="card-link">
                <div class="card">
                    <div class="reveal-box">
                        <img src="images/Screenshot 2026-04-13 051731.png" class="reveal-img">
                    </div>
                    <div class="card-info">
                        <h3 class="card-name animate-text">Of The Oak Studio</h3>
                        <p class="card-category animate-text">Web Design • Branding</p>
                    </div>
                </div>
            </a>



        </div>
    </section>

    <section class="spacer">SAMI SHAIKH © 2026</section>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. Splitting Logic for Title (Word by Word)
        const title = document.getElementById('main-title');
        const titleWords = title.innerText.split(' ');
        title.innerHTML = '';
        titleWords.forEach(word => {
            const span = document.createElement('span');
            span.classList.add('title-word');
            span.innerText = word;
            title.appendChild(span);
            title.appendChild(document.createTextNode(' '));
        });

        // 2. Splitting Logic for Card Text (Character by Character)
        document.querySelectorAll('.animate-text').forEach(el => {
            const chars = el.innerText.split('');
            el.innerHTML = '';
            chars.forEach(char => {
                const box = document.createElement('span');
                box.classList.add('char-box');
                const span = document.createElement('span');
                span.classList.add('char');
                span.innerText = char;
                box.appendChild(span);
                el.appendChild(box);
            });
        });

        // 3. Cursor Logic
        const cursor = document.querySelector("#custom-cursor");
        window.addEventListener("mousemove", (e) => {
            gsap.to(cursor, { x: e.clientX - 40, y: e.clientY - 40, duration: 0.1, ease: "none" });
        });
        document.querySelectorAll(".card-link").forEach(link => {
            link.addEventListener("mouseenter", () => gsap.to(cursor, { scale: 1, duration: 0.3 }));
            link.addEventListener("mouseleave", () => gsap.to(cursor, { scale: 0, duration: 0.3 }));
        });

        // 4. Title Animation (Word Reveal)
        gsap.to(".title-word", {
            scrollTrigger: {
                trigger: ".header-row",
                start: "top 80%",
                end: "bottom 20%",
                scrub: 0.5,
            },
            color: "#ffffff",
            stagger: 0.2
        });

        // 5. Card Image Reveal
        document.querySelectorAll(".card").forEach((card) => {
            const box = card.querySelector(".reveal-box");
            const img = card.querySelector(".reveal-img");
            const chars = card.querySelectorAll(".char");

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: card,
                    start: "top 85%",
                    toggleActions: "play none none reverse"
                }
            });

            tl.fromTo(box, 
                { yPercent: 50, clipPath: "inset(100% 0% 0% 0%)" }, 
                { yPercent: 0, clipPath: "inset(0% 0% 0% 0%)", duration: 1.2, ease: "expo.out", visibility: "visible" }
            )
            .from(img, { scale: 1.2, duration: 1.2, ease: "expo.out" }, "<")
            // Card Text Character Animation (Right-side style)
            .to(chars, {
                y: "0%",
                stagger: 0.02,
                duration: 0.8,
                ease: "power3.out"
            }, "-=0.8");
        });
    </script>
</body>
</html>
