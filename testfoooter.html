<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000000; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
        }

        .dsgn-footer {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: default;
        }

        #matter-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none; 
        }

        .bg-outline-text {
            position: absolute;
            font-size: clamp(100px, 25vw, 400px);
            font-weight: 800;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05);
            z-index: 0;
            white-space: nowrap;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 800px;
            padding: 80px 40px 40px 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-overlay * { pointer-events: auto; }

        .tagline {
            font-size: 11px;
            color: #ff2d55;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .huge-title {
            font-size: clamp(35px, 8vw, 85px);
            font-weight: 800;
            color: #ffffff;
            line-height: 0.9;

            letter-spacing: -2px;
        }

            font-size: clamp(16px, 2.5vw, 24px);
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid #ff2d55;

            font-weight: 300;
            transition: 0.4s;
            margin-bottom: 60px;
        }

            color: #ff2d55;

        }

            </ul>

                <a href="#" class="social-item"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="social-item"><i class="fa-brands fa-linkedin-in"></i></a>
                <a href="#" class="social-item"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.querySelector('.dsgn-footer');
    const canvasTarget = document.getElementById('matter-container');
    let animationStarted = false;

    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
    const engine = Engine.create();
    
    // Physics adjustments for stacking
    engine.world.gravity.y = 1; 
    engine.velocityIterations = 8; // More precision for stacking
    engine.positionIterations = 1;

    const render = Render.create({
        element: canvasTarget,
        engine: engine,
        options: {
            width: container.clientWidth,
            height: container.clientHeight,
            wireframes: false,
            background: 'transparent',
            pixelRatio: window.devicePixelRatio
        }
    });

    const coinImages = [
        'images/wordpress-removebg-preview.png',
        'images/shopify-removebg-preview.png',
        'images/html-removebg-preview.png',
        'images/css-removebg-preview.png',
        'images/js-removebg-preview.png'
    ];

    let ground, leftWall, rightWall;

    function createBoundaries() {
        if (ground) Composite.remove(engine.world, [ground, leftWall, rightWall]);
        const width = container.clientWidth;
        const height = container.clientHeight;

        // Ground ko thoda mota rakha hai taake stacking base solid ho
        ground = Bodies.rectangle(width / 2, height + 25, width, 50, { isStatic: true, friction: 1 });
        leftWall = Bodies.rectangle(-25, height / 2, 50, height, { isStatic: true, friction: 1 });
        rightWall = Bodies.rectangle(width + 25, height / 2, 50, height, { isStatic: true, friction: 1 });

        Composite.add(engine.world, [ground, leftWall, rightWall]);
    }

    function startAnimation() {
        if (animationStarted) return;
        animationStarted = true;

        const isMobile = window.innerWidth < 768;
        const coinCount = isMobile ? 35 : 65; // Mobile ke liye count thoda optimize kiya
        const radius = isMobile ? 12 : 22;   // Size thoda barhaya taake stack nazar aaye

        for (let i = 0; i < coinCount; i++) {
            // Coins ko random width par lekin height mein gap ke sath phenka taake ek sath dhappa na ho
            const x = (Math.random() * (container.clientWidth - 40)) + 20;
            const y = isMobile ? -(i * 30) - 100 : -(i * 20) - 100; 

            const coin = Bodies.circle(x, y, radius, {
                restitution: 0.2, // Bounce kam kar diya (0.2)
                friction: 0.8,    // Friction barha di taake ek dusre par rukein (Stacking)
                frictionAir: 0.05, // Hawa mein thoda slow girein
                density: 0.01,
                render: {
                    sprite: {
                        texture: coinImages[i % coinImages.length],
                        xScale: (radius * 2.2) / 100, 
                        yScale: (radius * 2.2) / 100
                    }
                }
            });
            Composite.add(engine.world, coin);
        }

        createBoundaries();

        const mouse = Mouse.create(container); 
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });

        Composite.add(engine.world, mouseConstraint);
        render.mouse = mouse;

        mouseConstraint.mouse.element.removeEventListener("mousewheel", mouseConstraint.mouse.mousewheel);
        mouseConstraint.mouse.element.removeEventListener("DOMMouseScroll", mouseConstraint.mouse.mousewheel);
        
        Render.run(render);
        Runner.run(Runner.create(), engine);
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            // Mobile par halka sa delay taake scroll smooth rahe
            setTimeout(startAnimation, 300);
        }
    }, { threshold: 0.1 });

    observer.observe(container);

    window.addEventListener('resize', () => {
        render.canvas.width = container.clientWidth;
        render.canvas.height = container.clientHeight;
        createBoundaries();
    });
});

</script>

</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.querySelector('.dsgn-footer');
    const canvasTarget = document.getElementById('matter-container');
    
    const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint } = Matter;
    
    const engine = Engine.create();
    const runner = Runner.create();
    
    const render = Render.create({
        element: canvasTarget,
        engine: engine,
        options: {
            width: container.clientWidth,
            height: container.clientHeight,
            wireframes: false,
            background: 'transparent',
            pixelRatio: window.devicePixelRatio 
        }
    });

    const coinImages = [
        'images/wordpress-removebg-preview.png',
        'images/shopify-removebg-preview.png',
        'images/html-removebg-preview.png',
        'images/css-removebg-preview.png',
        'images/js-removebg-preview.png',
        
    ];

    let ground, leftWall, rightWall;

    function createBoundaries() {
        if (ground) Composite.remove(engine.world, [ground, leftWall, rightWall]);
        const width = container.clientWidth;
        const height = container.clientHeight;

        ground = Bodies.rectangle(width/2, height + 25, width, 50, { isStatic: true });
        leftWall = Bodies.rectangle(-25, height/2, 50, height, { isStatic: true });
        rightWall = Bodies.rectangle(width + 25, height/2, 50, height, { isStatic: true });

        Composite.add(engine.world, [ground, leftWall, rightWall]);
    }

 function initPhysics() {
    const isMobile = window.innerWidth < 768;
    const coinCount = isMobile ? 25 : 35; // Bohat zyada coins se glitch hota hai, isse balance rakhein
    const radius = isMobile ? 20 : 30;

    for (let i = 0; i < coinCount; i++) {
        const x = Math.random() * container.clientWidth;
        const y = -Math.random() * 1000 - 100;

        const coin = Bodies.circle(x, y, radius, {
            restitution: 0.6, // Thoda bounce barhaya hai taake takrane par natural lage
            friction: 0.1,    // Thodi friction taake ek jagah tikein
            frictionAir: 0.01, // Hawa mein girte waqt ki speed
            density: 0.001,   // Weight taake mouse se move karne mein real lage
            render: {
                sprite: {
                    texture: coinImages[i % coinImages.length],
                    // Scale ko radius ke mutabiq fix kiya hai taake collision sahi ho
                    xScale: (radius * 2.1) / 100, 
                    yScale: (radius * 2.1) / 100
                }
            }
        });
        Composite.add(engine.world, coin);
    }

    createBoundaries();

    // Mouse Interaction Fix
    const mouse = Mouse.create(render.canvas);
    
    // Ye line important hai: Agar mouse overlay ke piche hai toh ye kaam karega
    const mouseConstraint = MouseConstraint.create(engine, {
        mouse: mouse,
        constraint: {
            stiffness: 0.2,
            render: { visible: false }
        }
    });

    Composite.add(engine.world, mouseConstraint);
    
    // Mouse scroll wheel interaction ko disable karna taake page scroll na ruke
    mouse.element.removeEventListener("mousewheel", mouse.mousewheel);
    mouse.element.removeEventListener("DOMMouseScroll", mouse.mousewheel);

    Render.run(render);
    Runner.run(runner, engine);
}




    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
            if (engine.world.bodies.length === 0) initPhysics();
            runner.enabled = true;
        } else {
            runner.enabled = false;
        }
    }, { threshold: 0.1 });

    observer.observe(container);

    window.addEventListener('resize', () => {
        render.canvas.width = container.clientWidth;
        render.canvas.height = container.clientHeight;
        createBoundaries();
    });
});
</script>
