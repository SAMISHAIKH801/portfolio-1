<!DOCTYPE html>
<html lang="en">
<body>

    <section class="den-agency-wrapper">
        <div class="den-agency-container">
            <h1 class="den-agency-heading" id="denAnimatedText">Helping brands thrive in the digital world</h1>
            
            <div class="den-agency-divider">
                <div class="den-agency-blue-circle">
                    <div class="den-agency-globe-wrapper">
                        <div class="den-agency-globe-inner">
                            <div class="den-line-v den-v1"></div>
                            <div class="den-line-v den-v2"></div>
                            <div class="den-line-v den-v3"></div>
                            <div class="den-line-v den-v4"></div>
                            <div class="den-line-h"></div>
                            <div class="den-line-h den-h1"></div>
                            <div class="den-line-h den-h2"></div>
                            <div class="den-line-h den-h3"></div>
                            <div class="den-line-h den-h4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <style>
        /* Container styling to avoid affecting global body */
        .den-agency-wrapper {
            margin: 0;
            padding: 100px 0;
            background: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .den-agency-container {
            width: 85%;
            max-width: 1100px;
            position: relative;
        }

        /* --- Text Animation --- */
        .den-agency-heading {
            font-size: 70px; /* Standard size for desktop */
            font-weight: 500;
            line-height: 1.1;
            color: #1a1a1a;
            margin-bottom: 90px;
            letter-spacing: -0.02em;
        }

        /* Responsive font size without clamp if you prefer traditional */
        @media (max-width: 768px) {
            .den-agency-heading { font-size: 40px; }
        }

        .den-word { display: inline-block; margin-right: 0.25em; overflow: hidden; vertical-align: bottom; }
        
        .den-char {
            display: inline-block;
            opacity: 0;
            filter: blur(12px);
            transform: translateY(100%);
            animation: denSmokeReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes denSmokeReveal {
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* --- Divider & Circle --- */
        .den-agency-divider {
            width: 100%;
            height: 1px;
            background: #ededed;
            position: relative;
        }

        .den-agency-blue-circle {
            position: absolute;
            right: 15%;
            top: 50%;
            transform: translateY(-50%);
            width: 155px;
            height: 155px;
            background: #4459f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(68, 89, 242, 0.3);
        }

        /* --- Globe Logic --- */
        .den-agency-globe-wrapper {
            width: 75px;
            height: 75px;
            position: relative;
            perspective: 800px; 
        }

        .den-agency-globe-inner {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            animation: denRotateGlobe3D 20s linear infinite;
        }

        .den-line-v, .den-line-h {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 0.8px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            box-sizing: border-box;
            background: transparent;
        }

        /* Longitude Positions */
        .den-v1 { transform: rotateY(0deg); }
        .den-v2 { transform: rotateY(45deg); }
        .den-v3 { transform: rotateY(90deg); }
        .den-v4 { transform: rotateY(135deg); }

        /* Latitude Positions */
        .den-h1 { transform: rotateX(90deg) translateZ(18px) scale(0.9); }
        .den-h2 { transform: rotateX(90deg) translateZ(-18px) scale(0.9); }
        .den-h3 { transform: rotateX(90deg) translateZ(30px) scale(0.6); }
        .den-h4 { transform: rotateX(90deg) translateZ(-30px) scale(0.6); }
        .den-agency-globe-inner .den-line-h:not([class*="den-h"]) { transform: rotateX(90deg); }

        /* Poles */
        .den-agency-globe-inner::before, .den-agency-globe-inner::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            left: 50%;
            top: 50%;
        }
        .den-agency-globe-inner::before { transform: translate(-50%, -50%) translateZ(37px); }
        .den-agency-globe-inner::after { transform: translate(-50%, -50%) translateZ(-37px); }

        @keyframes denRotateGlobe3D {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(180deg); }
        }
    </style>

    <script>
        (function() {
            const textElement = document.getElementById('denAnimatedText');
            if(!textElement) return;
            
            const words = textElement.innerText.split(' ');
            textElement.innerHTML = '';

            words.forEach((word, wordIndex) => {
                const wordSpan = document.createElement('span');
                wordSpan.className = 'den-word';
                word.split('').forEach((char, charIndex) => {
                    const charSpan = document.createElement('span');
                    charSpan.className = 'den-char';
                    charSpan.innerText = char;
                    charSpan.style.animationDelay = `${(wordIndex * 0.12) + (charIndex * 0.03)}s`;
                    wordSpan.appendChild(charSpan);
                });
                textElement.appendChild(wordSpan);
            });
        })();
    </script>
</body>
</html>
