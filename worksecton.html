        .portfolio-filters { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        .filter-btn {
            position: relative;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 12px 32px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: color 0.4s ease, border-color 0.4s ease;
            outline: none;
            overflow: hidden;
            z-index: 1;
            border-radius: 4px;
        }

      /* THE "BUBBLE" LAYER UPDATED */
        .filter-btn::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            width: 120%; /* Size adjusted for better roundness */
            padding-top: 120%; 
            background-color: var(#dc2626);
            border-radius: 50%; /* Perfect ball shape */
            z-index: -1;
            /* Start position: center bottom and scaled down */
            transform: translate(-50%, 0) scale(0); 
            /* Transition slowed down for smoothness */
            transition: transform 2.4s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        .filter-btn:hover::after {
            /* Smoothly fills the button while maintaining center */
            transform: translate(-50%, -75%) scale(1.1); 
        }

        /* .filter-btn:hover::after {
            transform: translate(-50%, -70%) scale(1); 
        } */

        .filter-btn:hover { color: #000; border-color: #dc2626; }

        .filter-btn.active {
            background-color: #dc2626;
            color: #000;
            border-color: #dc2626;
        }

        .filter-btn.active::after { display: none; }

        .portfolio-cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 100px 50px;

        .project-card-name { 
            font-size: clamp(1.8rem, 4vw, 3rem);
