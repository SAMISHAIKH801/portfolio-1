<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Shaikh - Portfolio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://assets.codepen.io/16327/ScrollSmoother.min.js"></script>
    
    <style>
        :root {
            /* #999d9e: #999d9e;  */
            --dark-pill: rgba(28, 29, 32, 0.8);
            --text-white: #ffffff;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #999d9e;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;;
            overflow-x: hidden;
        }

        #smooth-wrapper { overflow: hidden; position: fixed; height: 100%; width: 100%; top: 0; left: 0; }
        #smooth-content { overflow: visible; width: 100%; }

        /* --- Hero Section --- */
        .hero-section {
            background-color: #999d9e;
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .reveal-container {
            position: relative;
            height: 100vh;
            width: 45vw;
            z-index: 5;
            overflow: hidden;
            visibility: hidden;
        }

        .hero-img {
            width: 100%; height: 140%; 
            object-fit: cover;
            position: absolute; top: 0;
        }

        /* --- Desktop Placement --- */
        .left-box { position: absolute; left: 0; top: 50%; transform: translateY(-50%); z-index: 40; opacity: 0; }
        .right-box { position: absolute; right: 60px; top: 50%; transform: translateY(-50%); z-index: 30; opacity: 0; }

        .location-pill {
            background: rgba(28, 29, 32, 0.8);
            backdrop-filter: blur(10px);
            color: #ffffff;
            display: flex;
            align-items: center;
            padding: 14px 20px 14px 24px; 
            border-radius: 0 100px 100px 0;
            gap: 40px;
            font-size: 14px;
            letter-spacing: 1.4px;
        }

        .globe-icon-wrap {
            width: 40px; height: 40px;
            background: #555;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .freelance-text {
            color: white; font-size: 24px; line-height: 1.2;
            display: flex; flex-direction: column; align-items: flex-start;
        }

        .arrow-icon { width: 25px; height: 25px; margin-bottom: 8px; color: #fff; }

        /* --- Marquee --- */
        .marquee-wrapper {
            position: absolute;
            bottom: 5vh; 
            width: 100%;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }
        .marquee-content { display: flex; white-space: nowrap; }
        .marquee-text { font-size: 15vw; font-weight: 600; color: #fff; padding-right: 80px; text-transform: uppercase; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .reveal-container { width: 100vw; }
            .marquee-wrapper { bottom: 25vh; } /* Marquee thoda upar */

            .mobile-info-footer {
                position: absolute;
                bottom: 3vh; /* Boxes marquee se neeche */
                left: 0;
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding: 0 20px;
                box-sizing: border-box;
                z-index: 50;
            }

            .marquee-text{
                    font-size: 26vw !important;
            }

            .left-box, .right-box { position: relative; top: auto; transform: none; opacity: 1; }
            
            .location-pill { 
                padding: 10px 12px; 
                gap: 15px; 
                font-size: 11px; 
                margin-left: -20px; 
                border-radius: 0 50px 50px 0;
            }
            .freelance-text { font-size: 18px; }
            .arrow-icon { width: 20px; height: 20px; }
            .globe-icon-wrap { width: 30px; height: 30px; }
        }

        .next-section { height: 100vh; background: #1c1d20; display: flex; justify-content: center; align-items: center; color: white; font-size: 2rem; }
        @keyframes rotateGlobe { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="smooth-wrapper">
    <div id="smooth-content">
        <main class="hero-section">
            <div class="reveal-container" id="mainReveal">
                <img src="images/mainimg.png" alt="Sami Shaikh" class="hero-img" id="heroImg" data-speed="0.6">
            </div>

            <div class="marquee-wrapper" id="marqueeBox">
                <div class="marquee-content" id="marqueeContent">
                    <div class="marquee-text">Sami Shaikh — Sami Shaikh —</div>
                    <div class="marquee-text">Sami Shaikh —</div>
                    <div class="marquee-text">Sami Shaikh —</div>
                    <div class="marquee-text">Sami Shaikh —</div>
                </div>
            </div>

            <div class="mobile-info-footer">
                <div class="left-box" id="locationBox">
                    <div class="location-pill">
                        <span>Located in Pakistan</span>
                        <div class="globe-icon-wrap">
                            <svg class="globe-icon" style="width:20px; height:20px; animation: rotateGlobe 8s linear infinite;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="2" y1="12" x2="22" y2="12"></line>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="right-box" id="freelanceBox">
                    <div class="freelance-text">
                        <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="7" y1="7" x2="17" y2="17"></line>
                            <polyline points="17 7 17 17 7 17"></polyline>
                        </svg>
                        <span>Freelance<br>Developer</span>
                    </div>
                </div>
            </div>
        </main>

        <section class="next-section">Next Projects</section>
    </div>
</div>

<script>
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother);
    let smoother = ScrollSmoother.create({ wrapper: "#smooth-wrapper", content: "#smooth-content", smooth: 2, effects: true });

    window.addEventListener("load", function() {
        const tl = gsap.timeline({ defaults: { ease: "expo.out", duration: 1.8 } });
        tl.set("#mainReveal", { autoAlpha: 1 });

        tl.from("#mainReveal", { yPercent: 100 })
          .from("#heroImg", { yPercent: -100, scale: 1.3 }, "<")
          .fromTo("#locationBox", { x: -60, opacity: 0 }, { x: 0, opacity: 1, duration: 1.5 }, "-=1.2")
          .fromTo("#freelanceBox", { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 1.5 }, "<")
          .fromTo("#marqueeBox", { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 1.2 }, "-=1");

        let marquee = document.getElementById("marqueeContent");
        let marqueeTween = gsap.to(marquee, { xPercent: -50, duration: 18, repeat: -1, ease: "none" });

        gsap.to(marqueeTween, {
            timeScale: 8,
            scrollTrigger: { trigger: ".hero-section", start: "top top", end: "bottom top", scrub: 1.5 }
        });
    });




</script>
</body>
</html>
