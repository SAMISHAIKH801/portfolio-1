





<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami Shaikh - Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #e5e2da; --dark: #1a1a1a; --accent: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fff; overflow-x: hidden; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        /* --- Main Header --- */
        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 25px 50px; background: var(--bg-color); position: relative; z-index: 10;
        }
        .logo { font-size: 28px; font-weight: 900; font-family: 'Bebas Neue', sans-serif; color: #000; text-decoration: none; }
        .center-menu { display: flex; gap: 40px; }

        /* Animation Text Core */
        .anim-text {
            display: inline-block; text-decoration: none; color: inherit;
            cursor: pointer; overflow: hidden; vertical-align: middle;
            will-change: transform;
        }
        .header-nav-link { font-size: 14px; font-weight: 600; height: 20px; line-height: 20px; color: #000; }
        .char { display: inline-block; will-change: transform; pointer-events: none; }

        .header-btn {
            display: flex; align-items: center; background: var(--dark);
            color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; gap: 10px;
            text-decoration: none; min-width: max-content;
        }
        .btn-img img { width: 30px; height: 30px; border-radius: 4px; object-fit: cover; }
        .btn-text-wrap { color: white !important; font-size: 13px; height: 18px; line-height: 18px; }

        /* --- Sticky Burger (Desktop) --- */
        .sticky-burger {
            position: fixed; top: 30px; right: 40px; width: 65px; height: 65px;
            background: var(--dark); border-radius: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer; z-index: 100;
            transform: scale(0); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .line { width: 22px; height: 2px; background: white; margin: 3px 0; pointer-events: none; }

        /* --- Menu Overlay --- */
        .menu-overlay {
            position: fixed; top: 0; right: 0; width: 100%; max-width: 550px;
            height: 100vh; background: var(--dark); z-index: 200; color: white;
            padding: 80px 60px; display: flex; flex-direction: column;
            clip-path: circle(0% at 100% 0%); pointer-events: none;
            transition: visibility 0.5s;
        }
        .menu-overlay.active { pointer-events: all; visibility: visible; }
        .overlay-logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; margin-bottom: 50px; color: #fff; text-decoration: none; }
        .overlay-nav { display: flex; flex-direction: column; gap: 5px; flex-grow: 1; }
        
        /* Menu Links - High Contrast */
        .menu-link {
            font-size: 70px; color: white; text-decoration: none;
            font-family: 'Bebas Neue', sans-serif; line-height: 1.1;
            display: block; height: 80px;
        }

        .overlay-footer { display: flex; gap: 20px; border-top: 1px solid #333; padding-top: 30px; flex-wrap: wrap; }
        .social-link { color: #888; text-decoration: none; font-size: 12px; transition: color 0.3s; }
        .social-link:hover { color: #fff; }
        .close-btn { position: absolute; top: 35px; right: 45px; font-size: 40px; cursor: pointer; color: #fff; line-height: 1; }

        /* --- Mobile Optimization --- */
        @media (max-width: 768px) {
            .main-header { padding: 15px 20px; height: 70px; }
            .center-menu { display: none; }
            .main-header .logo { font-size: 22px; position: absolute; left: 50%; transform: translateX(-50%); }
            
            .mobile-trigger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; z-index: 11; width: 30px; }
            .mobile-trigger .line { background: #000; width: 20px; height: 2px; }

            .header-btn { padding: 6px 10px; gap: 6px; }
            .btn-img img { width: 24px; height: 24px; }
            .btn-text-wrap { font-size: 11px; }

            .menu-link { font-size: 55px; height: 65px; }
            .menu-overlay { max-width: 100%; padding: 80px 30px; }
        }

        @media (min-width: 769px) { .mobile-trigger { display: none; } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="mobile-trigger" onclick="toggleMenu()">
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <a href="#" class="logo">SAMI SHAIKH</a>
        
        <nav class="center-menu">
            <a href="#" class="anim-text header-nav-link">PORTFOLIO</a>
            <a href="#" class="anim-text header-nav-link">MY PROCESS</a>
            <a href="#" class="anim-text header-nav-link">ABOUT</a>
        </nav>

        <a href="#" class="header-btn">
            <div class="btn-img"><img src="images/Gemini_Generated_Image_awqpwoawqpwoawqp7.png" alt="S"></div>
            <div class="anim-text btn-text-wrap">LET'S TALK</div>
        </a>
    </header>

    <div class="sticky-burger" id="desktop-trigger">
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div class="menu-overlay">
        <div class="close-btn" onclick="hideMenu()">&times;</div>
        <a href="#" class="overlay-logo">SAMI SHAIKH</a>
        
        <nav class="overlay-nav">
            <a href="#" class="menu-link anim-text" data-y="75">HOME</a>
            <a href="#" class="menu-link anim-text" data-y="75">WORK</a>
            <a href="#" class="menu-link anim-text" data-y="75">ABOUT</a>
            <a href="#" class="menu-link anim-text" data-y="75">CONTACT</a>
        </nav>

        <div class="overlay-footer">
            <a href="#" class="social-link">GITHUB</a>
            <a href="#" class="social-link">LINKEDIN</a>
            <a href="#" class="social-link">INSTAGRAM</a>
            <a href="#" class="social-link">FACEBOOK</a>
        </div>
    </div>

    <section style="height: 300vh; background: #f9f9f9; padding: 100px;">
        <h2 style="font-family: 'Bebas Neue'; font-size: 5vw; color: #ddd; text-align: center;">SCROLL TO TEST BURGER</h2>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        // --- 1. Robust Letter Animation Logic ---
        function initTextAnimations() {
            document.querySelectorAll('.anim-text').forEach(el => {
                const text = el.textContent;
                const offset = el.dataset.y || 20; // Custom offset for large menu items
                el.innerHTML = '';
                
                // Wrap each character
                [...text].forEach(char => {
                    const span = document.createElement('span');
                    span.textContent = char === ' ' ? '\u00A0' : char;
                    span.classList.add('char');
                    el.appendChild(span);
                });

                // Smooth Hover Effect
                el.addEventListener('mouseenter', () => {
                    const chars = el.querySelectorAll('.char');
                    gsap.killTweensOf(chars); // Prevent glitching on fast hover
                    
                    gsap.timeline()
                        .to(chars, {
                            y: -offset, 
                            stagger: 0.02, 
                            duration: 0.3, 
                            ease: "power2.in"
                        })
                        .set(chars, { y: offset })
                        .to(chars, {
                            y: 0, 
                            stagger: 0.02, 
                            duration: 0.4, 
                            ease: "power2.out"
                        });
                });
            });
        }

        initTextAnimations();

        // --- 2. Desktop Sticky Burger Scroll Reveal ---
        if (window.innerWidth > 768) {
            gsap.to(".sticky-burger", {
                scrollTrigger: {
                    trigger: "body",
                    start: "top -120",
                    toggleActions: "play none none reverse"
                },
                scale: 1,
                duration: 0.4,
                ease: "back.out(1.7)"
            });
        }

        // --- 3. Overlay Menu Timeline ---
        const menuOverlay = document.querySelector('.menu-overlay');
        let menuTl = gsap.timeline({ paused: true });

        menuTl.to(menuOverlay, {
            clipPath: "circle(150% at 100% 0%)",
            duration: 1.2,
            ease: "expo.inOut",
            onStart: () => menuOverlay.classList.add('active')
        })
        .from(".menu-link .char", {
            y: 100,
            stagger: 0.02,
            duration: 0.8,
            ease: "power4.out"
        }, "-=0.7")
        .from(".social-link", {
            opacity: 0,
            y: 15,
            stagger: 0.08,
            duration: 0.5
        }, "-=0.5");

        function toggleMenu() { menuTl.play(); }
        function hideMenu() { 
            menuTl.reverse();
            setTimeout(() => menuOverlay.classList.remove('active'), 1200);
        }

        document.getElementById('desktop-trigger').addEventListener('click', toggleMenu);
    </script>
</body>
</html>
